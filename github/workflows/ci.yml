name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    name: 'Build and push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20]

    steps:
    - uses: actions/checkout@v4

    - name: Setup node | ${{ maxtrix.node }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ maxtrix.node }}
        cache: 'yarn'
    - run: yarn
    - run: yarn run test